services:
  - type: web
    name: musicstore-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install fastapi "uvicorn[standard]" motor pymongo "python-jose[cryptography]" "passlib[bcrypt]" python-multipart "pydantic[email]" pydantic-settings python-dotenv aiofiles Pillow "bcrypt==4.0.1"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: music_store
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: CORS_ORIGINS
        value: '["https://musicstore-frontend.onrender.com"]'
      - key: UPLOAD_DIR
        value: uploads
      - key: DEBUG
        value: false

  - type: web
    name: musicstore-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://musicstore-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
